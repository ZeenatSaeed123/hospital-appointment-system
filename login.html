<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Hospital Appointment System</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-box">

    <div class="auth-logo">
      <i class="fa-solid fa-hospital cross"></i>
      <h2>Hospital Appointment System</h2>
      <p>Sign in to your account</p>
    </div>

    <div id="alertBox" class="alert hidden"></div>


    <form id="loginForm" novalidate onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <span class="error-msg" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
        <span class="error-msg" id="passError"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="register.html">Create one here</a>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
