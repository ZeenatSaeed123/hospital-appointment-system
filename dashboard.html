<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard — Hospital Appointment System</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <i class="fa-solid fa-hospital cross-icon"></i>
    <span>Hospital <span>System</span></span>
  </div>
  <div class="nav-links">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="doctors.html">Find Doctors</a>
    <button class="btn-nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-header">
 <h1>Welcome, <span id="patientName">Patient</span></h1>
  <p>Manage your appointments and book new ones easily.</p>
</div>

<div class="container">
  <div class="section">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue"><i class="fa-solid fa-calendar-days"></i></div>
        <div>
          <div class="stat-value" id="totalAppts">0</div>
          <div class="stat-label">Total Appointments</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon teal"><i class="fa-solid fa-circle-check"></i></div>
        <div>
          <div class="stat-value" id="upcomingAppts">0</div>
          <div class="stat-label">Confirmed</div>
        </div>
      </div>
      <div class="stat-card">
       <div class="stat-icon red"><i class="fa-solid fa-circle-xmark"></i></div>
        <div>
          <div class="stat-value" id="cancelledAppts">0</div>
          <div class="stat-label">Cancelled</div>
        </div>
      </div>
    </div>

    <div id="alertBox" class="alert hidden"></div>

    <div class="flex-between mb-2">
      <div>
        <div class="section-title">My Appointments</div>
        <div class="section-subtitle">View and manage your booked appointments</div>
      </div>
      <a href="doctors.html" class="btn btn-primary">+ Book New</a>
    </div>

    <div id="appointmentsList"></div>

  </div>
</div>

<footer class="footer">
  &copy; 2026 <span>Hospital Appointment System</span> — Built with HTML, CSS & JavaScript
</footer>

<script src="js/app.js"></script>
</body>
</html>
