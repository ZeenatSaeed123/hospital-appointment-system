<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doctor Dashboard — Hospital Appointment System</title>

  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <i class="fa-solid fa-hospital cross-icon"></i>
    <span>Hospital <span>System</span></span>
  </div>

  <div class="nav-links">
    <a href="doctor.html" class="active">My Schedule</a>
    <button class="btn-nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-header">
  <i class="fa-solid fa-user-doctor"></i>

  <h2 id="doctorWelcome">Doctor Dashboard</h2>

  <p>View your appointment schedule and patient list below.</p>
</div>

<div class="container">
  <div class="section">

    <div class="stats-grid">

      <div class="stat-card">
        <div class="stat-icon blue">
          <i class="fa-solid fa-calendar-days"></i>
        </div>

        <div>
          <div class="stat-value" id="todayCount">0</div>
          <div class="stat-label">Today's Appointments</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon teal">
          <i class="fa-solid fa-circle-check"></i>
        </div>

        <div>
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">Total Confirmed</div>
        </div>
      </div>

    </div>

    <div class="section-title mb-2">
      My Appointment Schedule
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Patient Name</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="scheduleTableBody">
        </tbody>

      </table>
    </div>

  </div>
</div>

<footer class="footer">
  &copy; 2026 <span>Hospital Appointment System</span>
</footer>

<script src="js/app.js"></script>

</body>
</html>
